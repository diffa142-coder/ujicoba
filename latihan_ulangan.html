<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        margin: 0px;
        background-color: #181717;
        min-height: 1000px;
    }

    .nav-container {
        max-width: 1200px;
        margin-inline: auto;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .nav-list ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        gap: 1rem;
    }

    .nav-list li a {
        text-decoration: none;
        color: #a0a0a0;
        font-size: 0.95rem;
        font-weight: 500;
        padding: 0.4rem 1rem;
        border-radius: 999px;
        transition: all 0.2s ease-in-out;
    }

    .nav-list li a:hover {
        background-color: #6c63ff;
        color: #ffffff;
    }

    .hero {
        padding: 5px 10px;
        height: 50px;
        width: 100%;
        background: #232020;
        color: aliceblue;
        margin-top: 0px;
        position: fixed;
        z-index: 999;
        box-sizing: border-box;
    }

    .logo {
        font-size: 30px;
        margin-top: -8px;
        margin-left: 50px;
        color: rgb(255, 255, 92);
        font-family: arial;
        font-weight: bold;
    }

    .home-img img {
        width: 300px;
        height: 300px;
        margin-top: 0;
        border-radius: 50%;
        object-fit: cover;
        border: solid 5px rgb(73, 75, 234);
    }

    #home {
        scroll-margin-top: 60px;
        padding: 0px 5rem;
        padding-top: 60px;
        min-height: 100vh;
        display: flex;
        align-items: center;
    }

    .home-contens {
        flex: 1;
        align-items: center;
        justify-content: space-between;
        display: flex;
    }

    .home-description {
        flex: 1;
        width: 500px;
        color: white;
        margin-top: 0;
    }

    .home-description h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
    }

    .tentang-img img {
        width: 300px;
        height: 400px;
        display: block;
        object-fit: cover;
        border: solid 5px rgb(73, 75, 234);
        flex-shrink: 0;
    }

    .tentang {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-around;
        padding: 0px 5rem;
        padding-top: 60px;
        min-height: 100vh;
        gap: 60px;
        color: white;
    }

    .tentang-desktipsi {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
        color: white;
        min-width: 0;
    }

    .tentang-desktipsi h1 {
        margin: 0;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 2px;
        color: #a0a0a0;
    }

    .tentang-desktipsi h2 {
        margin: 0;
        width: 100%;
        box-sizing: border-box;
        font-size: 1.6rem;
        font-weight: 700;
        color: #ffffff;
        border-left: 4px solid rgb(73, 75, 234);
        border-bottom: 1px solid rgba(73, 75, 234, 0.3);
        padding: 10px 16px;
        border-radius: 0 8px 8px 0;
        background-color: rgba(73, 75, 234, 0.08);
    }

    @media (max-width: 768px) {
        .logo {
            font-size: 22px;
            margin-left: 10px;
        }

        .nav-list li a {
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
        }

        #home {
            padding: 0 2rem;
            padding-top: 80px;
        }

        .home-contens {
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .home-description h1 {
            font-size: 2rem;
        }

        .home-img img {
            width: 200px;
            height: 200px;
            margin-top: 20px;
        }

        .tentang {
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0 2rem;
            padding-top: 80px;
            gap: 30px;
        }

        .tentang-desktipsi h1 {
            text-align: center;
        }

        .tentang-img img {
            width: 200px;
            height: 200px;
        }

        .tentang-desktipsi h2 {
            font-size: 1.2rem;
            text-align: left;
            width: 100%;
        }
    }

    @media (max-width: 480px) {
        .logo {
            font-size: 18px;
            margin-left: 5px;
        }

        .nav-list li a {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
        }

        #home {
            padding: 0 1.2rem;
            padding-top: 60px;
        }

        .home-description h1 {
            font-size: 1.6rem;
        }

        .home-img img {
            width: 160px;
            height: 160px;
        }

        .tentang {
            padding: 0 1.2rem;
            padding-top: 80px;
            gap: 20px;
        }

        .tentang-img img {
            width: 160px;
            height: 160px;
        }

        .tentang-desktipsi h2 {
            font-size: 1rem;
            padding: 8px 12px;
        }
    }
</style>
<body>
    <div class="hero">
        <nav class="nav-container">
            <div class="logo">T E N</div>
            <div class="nav-list">
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#tentang">About</a></li>
                </ul>
            </div>
        </nav>
    </div>

    <main>
        <section id="home">
            <div class="home-contens">
                <div class="home-description">
                    <h1>selamat datang</h1>
                    <p>silahkan di lihat</p>
                </div>

                <div class="home-img">
                    <img src="foto.jpeg" alt="Foto saya">
                </div>
            </div>
        </section>

        <section id="tentang">
            <div class="tentang">
                <div class="tentang-img">
                    <img src="foto2.jpeg" alt="Foto saya">
                </div>

                <div class="tentang-desktipsi">
                    <h1>KELAS</h1>
                    <h2>X PPLG 1</h2>
                    <h1>NAMA</h1>
                    <h2>Diffa Rakha Pradipta</h2>
                    <h1>About</h1>
                    <h2>Perkenalkan Nama saya Diffa rakha pradipta saya berusia 17 tahun dan saya sekolah di SMK NEGRI 1 CIANJUR jurusan PENGEMBANGAN PERANGKAT LUNAK DAN GIM</h2>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
