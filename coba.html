<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

    /* ==============================
       GLOBAL / BODY
    ============================== */
    body {
        margin: 0px;
        background-color: #181717;
        min-height: 1000px;
    }

    /* ==============================
       NAVBAR - CONTAINER
    ============================== */
    .nav-container {
        max-width: 1200px;
        margin-inline: auto;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .nav-list ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        gap: 1rem;
    }

    .nav-list li a {
        text-decoration: none;
        color: #a0a0a0;
        font-size: 0.95rem;
        font-weight: 500;
        padding: 0.4rem 1rem;
        border-radius: 999px;
        transition: all 0.2s ease-in-out; 
    }

    .nav-list li a:hover {
        background-color: #6c63ff;
        color: #ffffff;
    }

    .hero {
        padding: 5px 10px;
        height: 50px;
        width: 100%;
        background: #232020;
        color: aliceblue;
        margin-top: 0px;
        position: fixed;
        z-index: 999;
    }

    .logo {
        font-size: 30px;
        margin-top: -8px;
        margin-left: 50px;
        color: rgb(255, 255, 92);
        font-family: arial;
        font-weight: bold;
    }

    /* ==============================
       SECTION HOME
    ============================== */
    #home {
        scroll-margin-top: 60px;
        padding: 0 5rem;
        padding-top: 60px;
        min-height: 100vh;
        display: flex;
        align-items: center;
    }

    .home-contens {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 40px;
    }

    .home-description {
        flex: 1;
        color: white;
    }

    .home-description h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
    }

    .home-img img {
        width: 300px;
        height: 300px;
        border-radius: 50%;
        object-fit: cover;
        border: solid 5px rgb(73, 75, 234);
    }

    /* ==============================
       SECTION TENTANG
    ============================== */
    .tentang {
        display: flex;          
        align-items: center;    
        justify-content: space-around;
        padding: 0 5rem;
        padding-top: 60px;
        min-height: 100vh;
        gap: 60px;
        color: white;
    }   

    .tentang-img img {
        width: 300px;
        height: 300px;
        object-fit: cover;
        border: solid 5px rgb(73, 75, 234);
        display: block;
        flex-shrink: 0;
    }

    .tentang-desktipsi {
        flex: 1;                
        display: flex;
        flex-direction: column;
        gap: 10px;
        color: white;
    }

    .tentang-desktipsi h1 {
        margin: 0;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 2px;
        color: #a0a0a0;
    }

    .tentang-desktipsi h2 {
        margin: 0;
        font-size: 1.6rem;
        font-weight: 700;
        color: #ffffff;
        border-left: 4px solid rgb(73, 75, 234);
        border-bottom: 1px solid rgba(73, 75, 234, 0.3);
        padding: 10px 16px;
        border-radius: 0 8px 8px 0;
        background-color: rgba(73, 75, 234, 0.08);
    }


    /* ==============================
       RESPONSIVE - TABLET (max 768px)
       Saat layar <= 768px (tablet/HP besar):
       - padding dikurangi
       - font sedikit dikecilkan
    ============================== */
    @media (max-width: 768px) {

        /* Navbar logo kecilkan sedikit */
        .logo {
            font-size: 22px;
            margin-left: 10px;
        }

        /* Menu navbar font lebih kecil */
        .nav-list li a {
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
        }

        /* Section home padding dikurangi */
        #home {
            padding: 0 2rem;
            padding-top: 60px;
        }

        /* Layout HOME jadi vertikal (foto di bawah teks) */
        .home-contens {
            flex-direction: column;       /* dari horizontal jadi vertikal */
            align-items: center;
            text-align: center;
        }

        .home-description h1 {
            font-size: 2rem;              /* judul dikecilkan */
        }

        /* Foto home dikecilkan */
        .home-img img {
            width: 200px;
            height: 200px;
            margin-top: 20px;
        }

        /* Section tentang padding dikurangi */
        .tentang {
            padding: 0 2rem;
            padding-top: 80px;
            gap: 30px;
        }

        /* Layout TENTANG jadi vertikal (foto di atas, teks di bawah) */
        .tentang {
            flex-direction: column;       /* dari horizontal jadi vertikal */
            align-items: center;
            text-align: center;
        }

        /* Foto tentang dikecilkan */
        .tentang-img img {
            width: 200px;
            height: 200px;
        }

        /* Border kiri tetap tapi teks rata tengah */
        .tentang-desktipsi h2 {
            font-size: 1.2rem;
            text-align: left;            /* teks nilai tetap rata kiri agar border kiri keliatan */
        }
    }


    /* ==============================
       RESPONSIVE - HP KECIL (max 480px)
       Saat layar <= 480px (HP kecil/opsel):
       - semua ukuran diperkecil lagi
       - padding seminimal mungkin
    ============================== */
    @media (max-width: 480px) {

        .logo {
            font-size: 18px;
            margin-left: 5px;
        }

        /* Sembunyikan teks menu, tampilkan hanya 3 huruf */
        .nav-list li a {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
        }

        #home {
            padding: 0 1.2rem;
            padding-top: 60px;
        }

        .home-description h1 {
            font-size: 1.6rem;
        }

        .home-img img {
            width: 160px;
            height: 160px;
        }

        .tentang {
            padding: 0 1.2rem;
            padding-top: 80px;
            gap: 20px;
        }

        .tentang-img img {
            width: 160px;
            height: 160px;
        }

        .tentang-desktipsi h2 {
            font-size: 1rem;
            padding: 8px 12px;
        }
    }

</style>
<body>

    <!-- NAVBAR -->
    <div class="hero">
        <nav class="nav-container">
            <div class="logo">T E N</div>
            <div class="nav-list">
                <ul>    
                    <li><a href="#home">home</a></li>
                    <li><a href="#tentang">tentang</a></li>
                    <li><a href="#about">About</a></li>
                </ul>
            </div>
        </nav>
    </div>    

    <main>

        <!-- SECTION HOME -->
        <section id="home">
            <div class="home-contens">
                <!-- Teks kiri (desktop) / atas (HP) -->
                <div class="home-description">
                    <h1>selamat datang</h1>
                    <p>silahkan di lihat</p>
                </div>
                <!-- Foto kanan (desktop) / bawah (HP) -->
                <div class="home-img">
                    <img src="foto.jpeg" alt="Foto saya">
                </div>
            </div>
        </section> 
        
        <!-- SECTION TENTANG -->
        <section id="tentang">
            <div class="tentang">
                <!-- Foto kiri (desktop) / atas (HP) -->
                <div class="tentang-img">
                    <img src="foto.jpeg" alt="Foto saya">
                </div>
                <!-- Teks kanan (desktop) / bawah (HP) -->
                <div class="tentang-desktipsi">
                    <h1>KELAS</h1>
                    <h2>X PPLG 1</h2>
                    <h1>NAMA</h1>
                    <h2>Diffa Rakha Pradipta</h2>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
